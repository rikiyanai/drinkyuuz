name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages artifact
        run: |
          mkdir -p dist
          # Copy everything in the repo (except .git and CI metadata) to dist/
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' ./ dist/
          # Also expose the same content under /drinkyuuz/ so links work both at
          # rikiworld.com/drinkyuuz/ (CF preserves path) and rikiyanai.github.io/drinkyuuz/
          mkdir -p dist/drinkyuuz
          rsync -a --exclude='drinkyuuz' --exclude='.git' --exclude='.github' --exclude='dist' ./ dist/drinkyuuz/
          # Custom 404 just bounces back to the mirror's index
          cp dist/index.html dist/404.html
          printf "rikiworld.com\n" > dist/CNAME
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
