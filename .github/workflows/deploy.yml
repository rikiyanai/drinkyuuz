name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages artifact at /drinkyuuz/ subpath
        run: |
          mkdir -p dist/drinkyuuz
          # Copy every file (except .github and dist itself) into dist/drinkyuuz
          rsync -a --exclude='.github' --exclude='dist' --exclude='.git' ./ dist/drinkyuuz/
          # Also seed the root with an index that redirects to the subpath, so
          # rikiworld.com (apex) doesn't 404 if hit directly.
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html><head><meta http-equiv="refresh" content="0; url=/drinkyuuz/"></head>
          <body>Redirecting to <a href="/drinkyuuz/">/drinkyuuz/</a>.</body></html>
          HTML
          cp dist/index.html dist/404.html
          printf "rikiworld.com\n" > dist/CNAME
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
